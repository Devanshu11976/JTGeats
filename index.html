<!DOCTYPE html>
<html lang="en">

<head>

  <!-- ── Meta ── -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JTGeats — Authentic Home Food in India</title>

  <!-- ── Fonts ── -->
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=Roboto:wght@400;500&family=Squada+One&display=swap"
    rel="stylesheet" />

  <!-- ── Stylesheet ── -->
  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <!-- ════════════════════════════════════════
       HEADER / NAV
       Frame 38 — 1440×80px | bg #1AC073
  ════════════════════════════════════════ -->
  <header class="site-header">
    <nav class="nav container">

      <!-- Logo -->
      <div class="nav__logo">
        <div class="nav__brand">JTGeats</div>
      </div>

      <!-- Main menu -->
      <ul class="nav__links">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#menu">Menu</a></li>
        <li><a href="#blog">Blog</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>

      <!-- Search & Cart -->
      <div class="nav__icons">
        <button class="nav__icon-btn" aria-label="Search">
          <img src="assets/Search.svg" alt="Search" />
        </button>
        <div class="nav__cart-wrap">
          <button class="nav__icon-btn" aria-label="Cart">
            <img src="assets/Cart.svg" alt="Cart" />
          </button>
          <span class="nav__cart-badge"></span>
        </div>
      </div>

    </nav>
  </header>
  <!-- /HEADER -->


  <!-- ════════════════════════════════════════
       MAIN CONTENT
  ════════════════════════════════════════ -->
  <main id="main-content">


    <!-- ════════════════════════════════════════
         HERO / LANDING SECTION
         Frame 38 — 1440×800px | bg #1AC073
    ════════════════════════════════════════ -->
    <section class="hero" id="home">
      <div class="container hero__inner">

        <!-- Text content -->
        <div class="hero__content">
          <h1 class="hero__heading">Authentic Home food in India</h1>
          <p class="hero__subtext">JTGeats is a courier service in which authentic home cook food is delivered to a
            customer.</p>

          <!-- Search bar -->
          <div class="hero__search">
            <input type="text" class="hero__search-input" placeholder="Search food you love" />
            <button class="hero__search-btn">Search</button>
          </div>
        </div>
        <!-- /Text content -->

        <!-- Chef illustration -->
        <div class="hero__illustration">
          <img src="assets/chef-illustration.svg" alt="Chef cooking" />
        </div>
        <!-- /Chef illustration -->

      </div>
    </section>
    <!-- /HERO -->


  </main>
  <!-- /MAIN CONTENT -->


  <!-- ════════════════════════════════════════
       SCRIPTS
  ════════════════════════════════════════ -->
  <script src="script.js"></script>

</body>

</html>
